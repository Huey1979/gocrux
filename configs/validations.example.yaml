# ============================================================
# 输入校验配置文件
#
# 用途：
#   对 Create / Update / List 接口的入参进行类型、必填、长度、枚举、格式等校验。
#   框架自动从 entity struct 推导出基础规则（类型、gorm size、not null），
#   此文件用于覆盖或增强这些规则。
#
# 使用方式：
#   vcMap, err := handler.LoadValidationConfig("configs/validations.yaml")
#   cfg.Validate = vcMap["sys_site"]
# ============================================================

validations:

  # ----------------------------------------------------------
  # 站点管理
  # ----------------------------------------------------------
  sys_site:
    create:
      site_code:
        required: true
        max_length: 64
      site_name:
        required: true
        max_length: 128
      site_type:
        enum: ["web", "app", "miniapp"]
      domain:
        max_length: 256
        format: url                         # 内置 URL 格式校验
    update:
      site_code:
        max_length: 64
      site_type:
        enum: ["web", "app", "miniapp"]
    list:
      page_size:
        max: 200
      order_by:
        enum: ["site_code", "site_name", "created_at", "updated_at"]

  # ----------------------------------------------------------
  # 角色管理
  # ----------------------------------------------------------
  sys_role:
    create:
      role_code:
        required: true
        max_length: 64
      role_name:
        required: true
        max_length: 128
    list:
      page_size:
        max: 200

  # ----------------------------------------------------------
  # 用户管理
  # ----------------------------------------------------------
  sys_user:
    create:
      user_name:
        required: true
        max_length: 64
      email:
        max_length: 128
        format: email                       # 内置邮箱格式校验
      phone:
        max_length: 20
        format: phone                       # 内置手机号格式校验（1[3-9]xxxxxxxxx）
      birth_date:
        format: date                        # 日期格式校验（YYYY-MM-DD）
    update:
      email:
        max_length: 128
      phone:
        max_length: 20
    list:
      page_size:
        max: 200

  # ----------------------------------------------------------
  # 操作日志（时间字段校验示例）
  # ----------------------------------------------------------
  sys_operation_log:
    list:
      created_at_start:
        format: datetime                    # 防止前端传空字符串 ""
      created_at_end:
        format: datetime

# ============================================================
# 类型转换（宽松模式）
#
# 框架在类型不匹配时优先尝试转换，而不是直接报错：
#   "123"   → 123     (string → int)       ✅
#   123     → "123"   (int → string)        ✅
#   "1"     → true    (string → bool)       ✅
#   0       → false   (int → bool)          ✅
#   "abc"   → 123     (string → int)        ❌ 无法转换才报错
#
# ============================================================
# 支持的校验规则：
#
#   type:        期望类型（string/int/float/bool/time）
#   required:    是否必填（Create 由 gorm not null 自动推导）
#   min:         数值最小值
#   max:         数值最大值
#   min_length:  字符串最小长度
#   max_length:  字符串最大长度
#   enum:        枚举值白名单
#   pattern:     正则表达式（Go 语法）
#   format:      内置格式校验（不写正则也能用）
#
# ============================================================
# 内置格式（format 字段）：
#
#   datetime  — 日期时间（2006-01-02 15:04:05 等）
#   date      — 日期（2006-01-02）
#   time      — 时间（15:04:05）
#   email     — 邮箱
#   url       — URL（http/https）
#   phone     — 手机号（1[3-9]xxxxxxxxx）
#   ulid      — ULID（26位 Crockford base32，*_ulid 字段自动开启）
#
# 注：
# - 未列出的字段使用自动推导的默认规则
# - Update 不强制 required（只校验传入字段的类型/长度等）
# - pattern 支持 Go 正则语法，YAML 中需要用双引号包裹
# ============================================================
